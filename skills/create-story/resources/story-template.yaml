# <!-- Powered by BMAD™ Core -->
template:
  id: story-template-v2
  name: Story Document
  version: 2.0
  output:
    format: markdown
    filename: docs/stories/{{epic_num}}.{{story_num}}.{{story_title_short}}.md
    title: "Story {{epic_num}}.{{story_num}}: {{story_title_short}}"

workflow:
  mode: interactive
  elicitation: advanced-elicitation

agent_config:
  editable_sections:
    - Status
    - Story
    - Acceptance Criteria
    - Tasks / Subtasks
    - Dev Notes
    - Testing
    - Change Log
    - QA Handoff Notes
    - Bug Reports

sections:
  - id: status
    title: Status
    type: choice
    choices: [Draft, Approved, InProgress, Review, Done]
    instruction: Select the current status of the story
    owner: scrum-master
    editors: [scrum-master, dev-agent]

  - id: story
    title: Story
    type: template-text
    template: |
      **As a** {{role}},
      **I want** {{action}},
      **so that** {{benefit}}
    instruction: Define the user story using the standard format with role, action, and benefit
    elicit: true
    owner: scrum-master
    editors: [scrum-master]

  - id: acceptance-criteria
    title: Acceptance Criteria
    type: numbered-list
    instruction: Copy the acceptance criteria numbered list from the epic file
    elicit: true
    owner: scrum-master
    editors: [scrum-master]

  - id: tasks-subtasks
    title: Tasks / Subtasks
    type: bullet-list
    instruction: |
      Break down the story into specific tasks and subtasks needed for implementation.
      Reference applicable acceptance criteria numbers where relevant.
    template: |
      - [ ] Task 1 (AC: # if applicable)
        - [ ] Subtask1.1...
      - [ ] Task 2 (AC: # if applicable)
        - [ ] Subtask 2.1...
      - [ ] Task 3 (AC: # if applicable)
        - [ ] Subtask 3.1...
    elicit: true
    owner: scrum-master
    editors: [scrum-master, dev-agent]

  - id: dev-notes
    title: Dev Notes
    instruction: |
      Populate relevant information, only what was pulled from actual artifacts from docs folder, relevant to this story:
      - Do not invent information
      - If known add Relevant Source Tree info that relates to this story
      - If there were important notes from previous story that are relevant to this one, include them here
      - Put enough information in this section so that the dev agent should NEVER need to read the architecture documents, these notes along with the tasks and subtasks must give the Dev Agent the complete context it needs to comprehend with the least amount of overhead the information to complete the story, meeting all AC and completing all tasks+subtasks
    elicit: true
    owner: scrum-master
    editors: [scrum-master]
    sections:
      - id: testing-standards
        title: Testing
        instruction: |
          List Relevant Testing Standards from Architecture the Developer needs to conform to:
          - Test file location
          - Test standards
          - Testing frameworks and patterns to use
          - Any specific testing requirements for this story
        elicit: true
        owner: scrum-master
        editors: [scrum-master]

      - id: manual-testing-steps
        title: Manual Testing Steps
        instruction: |
          Provide a step-by-step walkthrough for manually verifying this story in the running app.
          Populated by the SM at story creation from routing docs, UX flows, and acceptance criteria.
          The developer should refine this after implementation in QA Handoff Notes.

          Structure:
          1. Prerequisites — what must be true before testing (logged in, data seeded, feature flag, etc.)
          2. Navigation Path — exact steps to reach the feature from the app home screen
          3. Verification Steps — one step per acceptance criterion: what to tap/do and what to expect
          4. Edge Cases — specific interactions to check that are known risks (e.g. previously broken flows)

          Rules:
          - Be specific: name actual screens, buttons, and labels as they appear in the UI
          - Map each verification step to an AC number (e.g. "AC1:", "AC2:")
          - If navigation path is not yet known, state "To be confirmed during implementation"
          - Do NOT invent screen names — extract from routing docs or core-workflows.md
        template: |
          **Prerequisites**:
          - App running (`npm run goji-wallet:start:device`)
          - [Any auth/data prerequisites]

          **Navigation Path**:
          1. [Starting screen] → [tap X] → [destination screen]

          **Verification Steps**:
          - **AC1**: [Action] → expect [result]
          - **AC2**: [Action] → expect [result]

          **Edge Cases / Key Risks**:
          - [Known tricky interaction or previously broken flow to verify]
        elicit: true
        owner: scrum-master
        editors: [scrum-master, dev-agent]

  - id: change-log
    title: Change Log
    type: table
    columns: [Date, Version, Description, Author]
    instruction: Track changes made to this story document
    owner: scrum-master
    editors: [scrum-master, dev-agent, qa-agent]

  - id: dev-agent-record
    title: Dev Agent Record
    instruction: This section is populated by the development agent during implementation
    owner: dev-agent
    editors: [dev-agent]
    sections:
      - id: agent-model
        title: Agent Model Used
        template: "{{agent_model_name_version}}"
        instruction: Record the specific AI agent model and version used for development
        owner: dev-agent
        editors: [dev-agent]

      - id: debug-log-references
        title: Debug Log References
        instruction: Reference any debug logs or traces generated during development
        owner: dev-agent
        editors: [dev-agent]

      - id: completion-notes
        title: Completion Notes List
        instruction: Notes about the completion of tasks and any issues encountered
        owner: dev-agent
        editors: [dev-agent]

      - id: file-list
        title: File List
        instruction: List all files created, modified, or affected during story implementation
        owner: dev-agent
        editors: [dev-agent]

  - id: qa-handoff-notes
    title: QA Handoff Notes
    instruction: |
      Developer completes this section when marking story as "Ready for QA".
      Provides QA with context needed for testing.
    owner: dev-agent
    editors: [dev-agent]
    sections:
      - id: handoff-metadata
        title: Handoff Metadata
        template: |
          **Completed**: {{completion_date}}
          **Developer**: {{developer_name}}
          **Branch**: {{branch_name}}
          **PR**: {{pr_link}}
        instruction: Record handoff metadata
        owner: dev-agent
        editors: [dev-agent]

      - id: summary-of-changes
        title: Summary of Changes
        instruction: Developer adds high-level summary of what was implemented
        owner: dev-agent
        editors: [dev-agent]

      - id: testing-instructions
        title: Testing Instructions for QA
        instruction: Step-by-step instructions for QA to test the implementation
        owner: dev-agent
        editors: [dev-agent]

      - id: special-attention-areas
        title: Areas Requiring Special Attention
        instruction: Developer highlights edge cases, integration points, or areas needing thorough testing
        owner: dev-agent
        editors: [dev-agent]

      - id: known-limitations
        title: Known Limitations
        instruction: Document any constraints, workarounds, or incomplete features
        owner: dev-agent
        editors: [dev-agent]

      - id: qa-prerequisites-checklist
        title: QA Prerequisites Checklist
        template: |
          - [ ] All acceptance criteria implemented
          - [ ] Unit tests written and passing
          - [ ] Integration tests passing (if applicable)
          - [ ] Code review completed and approved
          - [ ] PR merged to develop branch
          - [ ] No console.log statements or debugging code
          - [ ] Documentation updated (README, inline comments)
          - [ ] CI/CD pipeline passing
        instruction: Developer checks off items before marking Ready for QA
        owner: dev-agent
        editors: [dev-agent]

  - id: qa-report
    title: QA Report
    instruction: Link to QA report will be added here when QA testing is complete (if issues found)
    owner: qa-agent
    editors: [qa-agent]
    template: |
      [Link to QA report will be added here when QA testing is complete]

  - id: bug-reports
    title: Bug Reports
    instruction: Links to bug reports will be added here if issues are found during QA testing
    owner: qa-agent
    editors: [qa-agent, dev-agent]
    sections:
      - id: open-bugs
        title: Open Bugs
        instruction: List bugs with status New or In Progress
        owner: qa-agent
        editors: [qa-agent, dev-agent]
        template: |
          [No open bugs]

      - id: in-qa-verification
        title: In QA Verification
        instruction: List bugs with status Ready for QA
        owner: dev-agent
        editors: [dev-agent, qa-agent]
        template: |
          [No bugs in verification]

      - id: closed-bugs
        title: Closed Bugs
        instruction: List bugs that have been verified as fixed
        owner: qa-agent
        editors: [qa-agent]
        template: |
          [No closed bugs]

  - id: qa-results
    title: QA Results
    instruction: |
      Final QA testing results and completion summary.
      QA adds completion notes when all testing passes (Happy Path).
    owner: qa-agent
    editors: [qa-agent]
